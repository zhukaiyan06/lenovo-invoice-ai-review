[build]
  base = "frontend/"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# All /api requests are proxied to the Render backend
[[redirects]]
  from = "/api/*"
  to = "https://lenovo-invoice-backend.onrender.com/api/:splat"
  status = 200
  force = false
