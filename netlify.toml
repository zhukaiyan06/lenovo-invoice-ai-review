[build]
  base = "frontend/"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# All /api requests are proxied to the Render backend
# ⚠️ 部署后端后请将下方 URL 替换为你的 Render 服务地址
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_RENDER_SERVICE.onrender.com/api/:splat"
  status = 200
  force = false
